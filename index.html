<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Antoni Low</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0805;
    --amber: #f5a623;
    --amber-dim: #c47d0e;
    --amber-glow: #ffd27a;
    --red: #c0392b;
    --cream: #f5edd6;
    --cream-dim: #a89880;
    --dark: #1a1208;
    --darker: #110d05;
    --border: rgba(245,166,35,0.25);
    --border-bright: rgba(245,166,35,0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NOISE TEXTURE OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 1000; opacity: 0.4;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    padding: 2.5rem 1.5rem 1.5rem;
    border-bottom: 1px solid var(--border);
    position: relative;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(245,166,35,0.08) 0%, transparent 70%);
  }

  .header-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--amber-dim);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 7vw, 3.2rem);
    font-weight: 900;
    line-height: 1;
    color: var(--amber);
    text-shadow: 0 0 40px rgba(245,166,35,0.4), 0 0 80px rgba(245,166,35,0.15);
    letter-spacing: -0.01em;
  }

  .header-logo {
    display: block;
    max-width: 280px;
    width: 100%;
    height: auto;
    margin: 0 auto;
    filter: drop-shadow(0 0 30px rgba(245,166,35,0.15));
  }

  .header-title em {
    font-style: italic;
    color: var(--amber-glow);
  }

  .header-tagline {
    font-size: 0.75rem;
    color: var(--cream-dim);
    margin-top: 0.5rem;
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  .header-logo {
    max-width: 320px;
    width: 80%;
    height: auto;
    margin: 0 auto;
    display: block;
  }

  .record-icon {
    display: inline-block;
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid var(--amber-dim);
    position: relative;
    vertical-align: middle;
    margin-right: 6px;
    animation: spin 4s linear infinite;
  }
  .record-icon::after {
    content: '';
    position: absolute; inset: 4px;
    border-radius: 50%;
    background: var(--amber-dim);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SEARCH ── */
  .search-wrap {
    padding: 1rem 1.2rem 0.6rem;
    position: sticky; top: 0; z-index: 50;
    background: linear-gradient(to bottom, var(--bg) 80%, transparent);
  }

  .search-box {
    width: 100%;
    background: var(--darker);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    padding: 0.7rem 1rem 0.7rem 2.5rem;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-box:focus {
    border-color: var(--amber);
    box-shadow: 0 0 0 2px rgba(245,166,35,0.15);
  }
  .search-box::placeholder { color: var(--cream-dim); }

  .search-icon {
    position: absolute;
    left: 2rem; top: 50%;
    transform: translateY(-50%);
    color: var(--amber-dim);
    font-size: 0.9rem;
    pointer-events: none;
  }

  .search-relative { position: relative; }

  .search-clear {
    position: absolute;
    right: 0.8rem; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: var(--cream-dim); font-size: 1rem;
    cursor: pointer; padding: 2px 6px;
    display: none;
  }
  .search-clear.visible { display: block; }

  /* ── DECADE TABS ── */
  .decade-tabs {
    display: flex;
    overflow-x: auto;
    gap: 0;
    padding: 0 1.2rem;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .decade-tabs::-webkit-scrollbar { display: none; }

  .decade-tab {
    flex-shrink: 0;
    padding: 0.65rem 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    color: var(--cream-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    background: none; border-top: none; border-left: none; border-right: none;
    white-space: nowrap;
  }
  .decade-tab:hover { color: var(--amber); }
  .decade-tab.active {
    color: var(--amber);
    border-bottom-color: var(--amber);
  }

  .tab-count {
    display: inline-block;
    font-size: 0.55rem;
    background: rgba(245,166,35,0.15);
    color: var(--amber-dim);
    border-radius: 2px;
    padding: 1px 4px;
    margin-left: 4px;
    vertical-align: middle;
  }
  .decade-tab.active .tab-count {
    background: rgba(245,166,35,0.25);
    color: var(--amber);
  }

  /* ── SONG LIST ── */
  .song-list {
    padding: 0.5rem 1.2rem 6rem;
  }

  .decade-header {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--amber);
    padding: 1.2rem 0 0.3rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.8rem;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .decade-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--amber-dim);
    letter-spacing: 0.1em;
  }

  .song-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 0;
    border-bottom: 1px solid rgba(245,166,35,0.08);
    gap: 1rem;
    animation: fadeIn 0.2s ease both;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .song-info { flex: 1; min-width: 0; }

  .song-title {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--cream);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }

  .song-artist {
    font-size: 0.72rem;
    color: var(--cream-dim);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.03em;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .btn-pedir {
    flex-shrink: 0;
    background: none;
    border: 1px solid var(--border-bright);
    color: var(--amber);
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.4rem 0.75rem;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    text-decoration: none;
    display: inline-block;
  }
  .btn-pedir:hover, .btn-pedir:active {
    background: var(--amber);
    color: var(--bg);
    border-color: var(--amber);
    box-shadow: 0 0 12px rgba(245,166,35,0.4);
  }

  /* ── SEARCH RESULTS ── */
  .search-results-header {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--amber-dim);
    text-transform: uppercase;
    padding: 1rem 0 0.5rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.5rem;
  }

  .no-results {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--cream-dim);
    font-size: 0.85rem;
  }
  .no-results span {
    display: block;
    font-size: 2rem;
    margin-bottom: 0.5rem;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,8,5,0.92);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--darker);
    border: 1px solid var(--border-bright);
    border-bottom: none;
    border-radius: 12px 12px 0 0;
    padding: 1.5rem 1.5rem 2.5rem;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .modal-handle {
    width: 36px; height: 3px;
    background: var(--border-bright);
    border-radius: 2px;
    margin: 0 auto 1.2rem;
  }

  .modal-song {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--amber-glow);
    margin-bottom: 0.2rem;
    line-height: 1.3;
  }

  .modal-artist {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--cream-dim);
    margin-bottom: 1.2rem;
    letter-spacing: 0.05em;
  }

  .modal-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--amber-dim);
    margin-bottom: 0.4rem;
    display: block;
  }

  .modal-input {
    width: 100%;
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.7rem 0.9rem;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    outline: none;
    margin-bottom: 1rem;
    resize: none;
    transition: border-color 0.2s;
  }
  .modal-input:focus { border-color: var(--amber); }
  .modal-input::placeholder { color: var(--cream-dim); opacity: 0.5; }

  .modal-buttons {
    display: flex;
    gap: 0.75rem;
  }

  .btn-cancel {
    flex: 1;
    background: none;
    border: 1px solid var(--border);
    color: var(--cream-dim);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.8rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cancel:hover { border-color: var(--cream-dim); color: var(--cream); }

  .btn-enviar {
    flex: 2;
    background: var(--amber);
    border: 1px solid var(--amber);
    color: var(--bg);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.8rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-enviar:hover {
    background: var(--amber-glow);
    border-color: var(--amber-glow);
    box-shadow: 0 0 16px rgba(245,166,35,0.4);
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--amber);
    color: var(--bg);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    padding: 0.75rem 1.5rem;
    border-radius: 4px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 300;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 0.7rem 1.2rem 1rem;
    background: linear-gradient(to top, var(--bg) 80%, transparent);
    text-align: center;
    z-index: 1001;
  }

  .footer-links {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.5rem;
  }

  .footer-link {
    position: relative;
    z-index: 1002;
    pointer-events: auto;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--amber-dim);
    text-decoration: none;
    border: 1px solid var(--border);
    padding: 0.4rem 0.9rem;
    border-radius: 3px;
    transition: all 0.15s;
  }
  .footer-link:hover, .footer-link:active {
    color: var(--amber);
    border-color: var(--border-bright);
  }

  .footer-link-kofi {
    background: rgba(245,166,35,0.12);
    border-color: var(--amber-dim);
    color: var(--amber);
  }
  .footer-link-kofi:hover, .footer-link-kofi:active {
    background: var(--amber);
    color: var(--bg);
    border-color: var(--amber);
    box-shadow: 0 0 16px rgba(245,166,35,0.35);
  }

  /* highlight search match */
  mark {
    background: rgba(245,166,35,0.3);
    color: var(--amber-glow);
    border-radius: 2px;
    padding: 0 1px;
  }

  /* ── LOADING STATE ── */
  .loading-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 500;
    gap: 1rem;
  }
  .loading-screen .record-icon {
    width: 40px; height: 40px;
    border-width: 3px;
  }
  .loading-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: var(--amber-dim);
    text-transform: uppercase;
  }
  .loading-screen.hidden { display: none; }

  .sync-badge {
    position: fixed;
    top: 0.6rem; right: 0.8rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.08em;
    color: var(--cream-dim);
    background: rgba(0,0,0,0.3);
    padding: 3px 8px;
    border-radius: 3px;
    z-index: 60;
    opacity: 0.7;
  }
  .sync-badge.offline { color: #e8a;  }

  /* ── MODAL CONFIRMACIÓN ── */
  .modal-confirm {
    text-align: center;
    padding: 2rem 1.5rem 2.5rem;
  }
  .confirm-icon {
    font-size: 2.5rem;
    margin-bottom: 0.8rem;
  }
  .confirm-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--amber-glow);
    margin-bottom: 0.6rem;
    line-height: 1.3;
  }
  .confirm-song {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--cream-dim);
    letter-spacing: 0.04em;
  }

  /* ── MODAL POSITION: subir en móvil para evitar el teclado ── */
  @media (max-height: 700px) {
    .modal-overlay {
      align-items: center;
      padding: 1rem;
    }
    .modal {
      border-radius: 12px;
      border-bottom: 1px solid var(--border-bright);
      max-height: 90vh;
      overflow-y: auto;
    }
  }
  .modal-overlay {
    padding-bottom: env(safe-area-inset-bottom);
  }
  /* Subir el modal para que no quede pegado al teclado */
  .modal-overlay.open {
    align-items: flex-end;
    padding-bottom: max(1rem, env(safe-area-inset-bottom));
  }
  @supports (-webkit-touch-callout: none) {
    /* iOS: el teclado virtual desplaza el viewport, subimos el modal */
    .modal-overlay.keyboard-open {
      align-items: center;
    }
  }

</style>
</head>

  <span class="record-icon"></span>
  <div class="loading-text">Cargando repertorio...</div>
</div>

<div class="sync-badge" id="syncBadge" style="display:none;"></div>

const SHEET_ID = '1dymrcd7hUy6g4Maq5iQMzNlFAnRLqci0vsSLw_GSiyw';
const SHEET_GID = '11001401';
// ═══════════════════════════════════════════

let SONGS = {};
let decades = [];
let currentDecade = null;
let selectedSong = null;

// ── CSV PARSING ──
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i + 1];
    if (inQuotes) {
      if (c === '"' && next === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\r') { /* skip */ }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else field += c;
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.length > 1 || (r.length === 1 && r[0].trim() !== ''));
}

function buildSongsFromRows(rows) {
  if (!rows.length) throw new Error('CSV vacio');
  const stripAccents = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const headers = rows[0].map(h => stripAccents(h.trim().toLowerCase()));
  const idxArtista = headers.findIndex(h => h.includes('artista'));
  const idxTitulo = headers.findIndex(h => h.includes('titulo'));
  const idxAno = headers.findIndex(h => h === 'ano' || h.includes('ano'));
  const idxVisible = headers.findIndex(h => h.includes('visible'));

  const grouped = {};
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 2) continue;
    const artista = (r[idxArtista] || '').trim();
    const titulo = (r[idxTitulo] || '').trim();
    const anoRaw = (r[idxAno] || '').trim();
    const visible = idxVisible >= 0 ? (r[idxVisible] || '').trim().toUpperCase() : 'SI';

    if (!titulo) continue;
    if (visible === 'NO') continue;

    const ano = parseInt(anoRaw, 10);
    const decada = isNaN(ano) ? 'Sin fecha' : (Math.floor(ano / 10) * 10) + 's';

    if (!grouped[decada]) grouped[decada] = [];
    grouped[decada].push({ Artista: artista || 'Desconocido', "T\u00edtulo": titulo });
  }

  Object.keys(grouped).forEach(dec => {
    grouped[dec].sort((a, b) => a.Artista.localeCompare(b.Artista, 'es'));
  });

  return grouped;
}

function sortDecadeKeys(keys) {
  return keys.sort((a, b) => {
    if (a === 'Sin fecha') return 1;
    if (b === 'Sin fecha') return -1;
    return parseInt(a) - parseInt(b);
  });
}

// ── COPIA LOCAL DE RESPALDO (si falla la conexion al Sheet) ──
const FALLBACK_SONGS = {"2020s":[{"Artista":"Carlos Ares","T\u00edtulo":"La Boca Del Lobo"},{"Artista":"Pu\u00f1o Drag\u00f3n","T\u00edtulo":"Har\u00e9 Lo Que Pueda"},{"Artista":"Ultraligera","T\u00edtulo":"Matanza En El Hotel"}]};

// ── LOAD DATA (via JSONP, evita bloqueos CORS de Google) ──
function fetchSheetJSONP() {
  return new Promise((resolve, reject) => {
    const callbackName = 'gsCallback_' + Date.now();
    const script = document.createElement('script');
    let settled = false;

    const cleanup = () => {
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
    };

    window[callbackName] = (data) => {
      settled = true;
      cleanup();
      resolve(data);
    };

    script.onerror = () => {
      if (!settled) { cleanup(); reject(new Error('No se pudo conectar con Google Sheets')); }
    };

    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${callbackName}&gid=${SHEET_GID}&_=${Date.now()}`;
    script.src = url;
    document.body.appendChild(script);

    setTimeout(() => {
      if (!settled) { cleanup(); reject(new Error('Tiempo de espera agotado')); }
    }, 8000);
  });
}

function gvizToRows(data) {
  // data.table.cols -> headers, data.table.rows -> filas
  const cols = data.table.cols.map(c => (c.label || c.id || '').trim());
  const rows = [cols];
  data.table.rows.forEach(r => {
    const row = r.c.map(cell => (cell && cell.v !== null && cell.v !== undefined) ? String(cell.v) : '');
    rows.push(row);
  });
  return rows;
}

async function loadRepertoire() {
  const badge = document.getElementById('syncBadge');
  try {
    const data = await fetchSheetJSONP();
    const rows = gvizToRows(data);
    const songs = buildSongsFromRows(rows);

    if (Object.keys(songs).length === 0) throw new Error('Sin canciones visibles');

    SONGS = songs;
    badge.textContent = '🟢 Repertorio actualizado';
    badge.classList.remove('offline');
    badge.style.display = 'block';
    setTimeout(() => { badge.style.display = 'none'; }, 4000);
  } catch (err) {
    console.warn('No se pudo cargar el repertorio en vivo, usando copia local:', err);
    SONGS = FALLBACK_SONGS;
    badge.textContent = '🟡 Sin conexión: ' + err.message;
    badge.classList.add('offline');
    badge.style.display = 'block';
  }

  decades = sortDecadeKeys(Object.keys(SONGS));
  let best = decades[0];
  let bestCount = -1;
  decades.forEach((dec, i) => {
    const count = SONGS[dec].length;
    if (count > bestCount) { bestCount = count; best = dec; }
  });
  currentDecade = best;
}

// ── INIT ──
async function init() {
  await loadRepertoire();
  buildTabs();
  renderDecade(currentDecade);
  document.getElementById('loadingScreen').classList.add('hidden');

  document.getElementById('searchInput').addEventListener('input', onSearch);
}

// ── TABS ──
function buildTabs() {
  const container = document.getElementById('decadeTabs');
  decades.forEach(dec => {
    const btn = document.createElement('button');
    btn.className = 'decade-tab' + (dec === currentDecade ? ' active' : '');
    btn.innerHTML = dec + `<span class="tab-count">${SONGS[dec].length}</span>`;
    btn.onclick = () => selectDecade(dec);
    container.appendChild(btn);
  });
}

function selectDecade(dec) {
  currentDecade = dec;
  document.querySelectorAll('.decade-tab').forEach((b, i) => {
    b.classList.toggle('active', decades[i] === dec);
  });
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('visible');
  renderDecade(dec);
}

// ── RENDER ──
function renderDecade(dec, highlight = '') {
  const songs = SONGS[dec];
  const list = document.getElementById('songList');
  list.innerHTML = `
    <div class="decade-header">
      <span>${dec}</span>
      <span class="decade-count">${songs.length} canciones</span>
    </div>
  `;
  songs.forEach(s => list.appendChild(songItem(s, highlight)));
}

function songItem(song, highlight = '') {
  const div = document.createElement('div');
  div.className = 'song-item';
  const title = highlight ? highlightText(song.Título, highlight) : escapeHtml(song.Título);
  const artist = highlight ? highlightText(song.Artista, highlight) : escapeHtml(song.Artista);
  div.innerHTML = `
    <div class="song-info">
      <div class="song-title">${title}</div>
      <div class="song-artist">${artist}</div>
    </div>
    <button class="btn-pedir" onclick='openModal(${JSON.stringify(song)})'>Pedir</button>
  `;
  return div;
}

// ── SEARCH ──
function onSearch(e) {
  const q = e.target.value.trim();
  const clearBtn = document.getElementById('searchClear');
  clearBtn.classList.toggle('visible', q.length > 0);

  if (!q) { renderDecade(currentDecade); return; }

  const norm = q.toLowerCase();
  const results = [];
  decades.forEach(dec => {
    SONGS[dec].forEach(s => {
      if (
        s.Título.toLowerCase().includes(norm) ||
        s.Artista.toLowerCase().includes(norm)
      ) results.push(s);
    });
  });

  const list = document.getElementById('songList');
  list.innerHTML = results.length
    ? `<div class="search-results-header">🔍 ${results.length} resultado${results.length !== 1 ? 's' : ''} para "${escapeHtml(q)}"</div>`
    : `<div class="no-results"><span>🎵</span>No encontramos "${escapeHtml(q)}"<br><small>Prueba con otro título o artista</small></div>`;

  results.forEach(s => list.appendChild(songItem(s, q)));
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('visible');
  renderDecade(currentDecade);
  document.getElementById('searchInput').focus();
}

// ── MODAL ──
function openModal(song) {
  selectedSong = song;
  document.getElementById('modalSong').textContent = song.Título;
  document.getElementById('modalArtist').textContent = song.Artista;
  document.getElementById('nombre').value = '';
  document.getElementById('dedicatoria').value = '';
  // Mostrar formulario, ocultar confirmación
  document.getElementById('modalContent').style.display = 'block';
  document.getElementById('modalConfirm').style.display = 'none';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('nombre').focus(), 300);

  // Detectar teclado virtual en móvil para subir el modal
  const nombre = document.getElementById('nombre');
  const ded = document.getElementById('dedicatoria');
  [nombre, ded].forEach(el => {
    el.addEventListener('focus', () => document.getElementById('modalOverlay').classList.add('keyboard-open'), { once: false });
    el.addEventListener('blur', () => setTimeout(() => document.getElementById('modalOverlay').classList.remove('keyboard-open'), 200), { once: false });
  });
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('modalOverlay').classList.remove('keyboard-open');
  selectedSong = null;
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// ── ENVIAR PETICIÓN ──
function enviarPeticion() {
  if (!selectedSong) return;

  const nombre = document.getElementById('nombre').value.trim();
  const dedicatoria = document.getElementById('dedicatoria').value.trim();
  const cancion = `${selectedSong.Título} — ${selectedSong.Artista}`;

  // Validar nombre obligatorio
  if (!nombre) {
    const input = document.getElementById('nombre');
    input.style.borderColor = 'var(--red)';
    input.placeholder = '¡Tu nombre es obligatorio!';
    input.focus();
    setTimeout(() => {
      input.style.borderColor = '';
      input.placeholder = 'Tu nombre...';
    }, 2500);
    return;
  }

  // Construir datos para Google Forms
  const formData = new FormData();
  formData.append(FIELD_NOMBRE, nombre);
  formData.append(FIELD_CANCION, cancion);
  if (dedicatoria) formData.append(FIELD_DEDICATORIA, dedicatoria);

  fetch(FORM_BASE_URL, {
    method: 'POST',
    mode: 'no-cors',
    body: formData
  }).catch(() => {});

  // Mostrar pantalla de confirmación en vez de cerrar el modal
  document.getElementById('modalContent').style.display = 'none';
  document.getElementById('confirmSong').textContent = cancion;
  document.getElementById('modalConfirm').style.display = 'block';
  selectedSong = null;
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── UTILS ──
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function highlightText(text, query) {
  const escaped = escapeHtml(text);
  const re = new RegExp(`(${escapeHtml(query).replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return escaped.replace(re, '<mark>$1</mark>');
}

init();
</script>
